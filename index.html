<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Ecommerce Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 24px;
}

nav {
  display: flex;
  justify-content: center;
  background: #333;
}

nav a {
  color: white;
  padding: 14px 20px;
  text-decoration: none;
}

nav a:hover {
  background: #555;
}

.banner {
  background: url('https://picsum.photos/1200/300') no-repeat center;
  height: 300px;
  background-size: cover;
}

.container {
  padding: 20px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.price {
  color: green;
  font-weight: bold;
}

button {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

button:hover {
  background: orange;
}

footer {
  background: black;
  color: white;
  text-align: center;
  padding: 10px;
  margin-top: 20px;
}
</style>

</head>

<body>

<header>🛒 My Ecommerce Store</header>

<nav>
<a href="#">Home</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Electronics</a>
<a href="#">Home Decor</a>
</nav>

<div class="banner"></div>

<div class="container">
<h2>All Products</h2>

<div class="products">

<div class="card">
<img src="https://picsum.photos/200?1">
<h3>Men Shirt</h3>
<p class="price">Rs 1500</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?2">
<h3>Women Dress</h3>
<p class="price">Rs 2500</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?3">
<h3>Headphones</h3>
<p class="price">Rs 3000</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/200?4">
<h3>Home Lamp</h3>
<p class="price">Rs 1800</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</div>
</div>

<footer>© 2026 My Store | All Rights Reserved</footer>

<script>
function addToCart() {
  alert("Product added to cart!");
}
</script>

</body>
</html>
